name: Sync upstream ECC

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository != 'affaan-m/ECC'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/affaan-m/ECC.git || git remote set-url upstream https://github.com/affaan-m/ECC.git
          git fetch upstream --prune

      - name: Detect upstream default branch
        id: upstream
        run: |
          default_branch=$(git remote show upstream | sed -n '/HEAD branch/s/.*: //p')
          if [ -z "$default_branch" ]; then
            default_branch=main
          fi
          echo "default_branch=$default_branch" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        run: |
          git merge --no-edit "upstream/${{ steps.upstream.outputs.default_branch }}"

      - name: Push synchronized fork
        run: |
          git push origin "HEAD:${GITHUB_REF_NAME}"
